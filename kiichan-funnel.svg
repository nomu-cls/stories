<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1800" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffcf5"/>
      <stop offset="100%" stop-color="#f5efe5"/>
    </linearGradient>
    <linearGradient id="honeyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5c542"/>
      <stop offset="100%" stop-color="#e8926e"/>
    </linearGradient>
    <linearGradient id="sageGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8cb88a"/>
      <stop offset="100%" stop-color="#6fa06d"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#85bdd9"/>
      <stop offset="100%" stop-color="#6a9fc0"/>
    </linearGradient>
    <linearGradient id="lavGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8a9d8"/>
      <stop offset="100%" stop-color="#9a8bc0"/>
    </linearGradient>
    <linearGradient id="coralGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2988e"/>
      <stop offset="100%" stop-color="#e06b6b"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000015"/>
    </filter>
    <filter id="shadowDeep">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1800" fill="url(#bgGrad)"/>

  <!-- ===== TITLE ===== -->
  <rect x="100" y="25" width="800" height="90" rx="20" fill="url(#honeyGrad)" filter="url(#shadowDeep)"/>
  <text x="500" y="62" text-anchor="middle" fill="#fff" font-size="22" font-weight="900">🐕 きいちゃん ビジネスファネル全体図</text>
  <text x="500" y="88" text-anchor="middle" fill="#fff" font-size="12" font-weight="600" opacity="0.9">こじらせ飼い主マインド講座 0期 → 事例収集 → 本講座</text>

  <!-- ===== FUNNEL SHAPE ===== -->
  <polygon points="200,140 800,140 880,1340 120,1340" fill="#f5efe5" opacity="0.3" stroke="#d4a017" stroke-width="1" stroke-dasharray="8,6"/>

  <!-- ===== STAGE 0: YOUTUBE ===== -->
  <rect x="150" y="155" width="700" height="120" rx="16" fill="#fff" stroke="#d4a017" stroke-width="2" filter="url(#shadow)"/>
  <rect x="150" y="155" width="700" height="35" rx="16" fill="url(#honeyGrad)"/>
  <rect x="150" y="172" width="700" height="18" fill="url(#honeyGrad)"/>
  <text x="180" y="180" fill="#fff" font-size="13" font-weight="900">📺 YouTube / SNS（認知）</text>
  <text x="700" y="180" text-anchor="end" fill="#fff" font-size="10" font-weight="600">TTP戦略</text>
  <text x="180" y="215" fill="#4a3a2a" font-size="11" font-weight="700">TTP先：獣医師まなみ（バズ率699%）/ リーリャの犬ごはん（436%）</text>
  <text x="180" y="237" fill="#777" font-size="10">栄養系入口動画 → パラダイムシフト「フード変えても変わらない→マインドだった」</text>
  <text x="180" y="255" fill="#d4a017" font-size="10" font-weight="700">▶ コンテンツ例：「こじらせ飼い主の口グセ3選」「犬が食べない本当の原因」</text>

  <!-- Arrow 0→1 -->
  <line x1="500" y1="275" x2="500" y2="310" stroke="#8cb88a" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="493,305 500,317 507,305" fill="#8cb88a"/>

  <!-- ===== STAGE 1: DIAGNOSIS CHAT ===== -->
  <rect x="160" y="320" width="680" height="120" rx="16" fill="#fff" stroke="#8cb88a" stroke-width="2" filter="url(#shadow)"/>
  <rect x="160" y="320" width="680" height="35" rx="16" fill="url(#sageGrad)"/>
  <rect x="160" y="337" width="680" height="18" fill="url(#sageGrad)"/>
  <text x="190" y="345" fill="#fff" font-size="13" font-weight="900">🐾 診断チャット LP（リード獲得）</text>
  <text x="700" y="345" text-anchor="end" fill="#fff" font-size="10" font-weight="600">✅ 実装済み</text>
  <text x="190" y="380" fill="#4a3a2a" font-size="11" font-weight="700">犬のきもち「わかってる？」クイズ → 心の栄養診断結果</text>
  <text x="190" y="400" fill="#777" font-size="10">→ きいちゃんの原体験ストーリー → LINE登録CTA</text>
  <text x="190" y="420" fill="#d4a017" font-size="10" font-weight="700">🎯 目標：LINE登録率 30%+</text>

  <!-- Arrow 1→2 -->
  <line x1="500" y1="440" x2="500" y2="475" stroke="#85bdd9" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="493,470 500,482 507,470" fill="#85bdd9"/>

  <!-- ===== STAGE 2: LINE ===== -->
  <rect x="170" y="485" width="660" height="155" rx="16" fill="#fff" stroke="#85bdd9" stroke-width="2" filter="url(#shadow)"/>
  <rect x="170" y="485" width="660" height="35" rx="16" fill="url(#skyGrad)"/>
  <rect x="170" y="502" width="660" height="18" fill="url(#skyGrad)"/>
  <text x="200" y="510" fill="#fff" font-size="13" font-weight="900">💬 LINE登録 + 特典配布（教育）</text>
  <text x="700" y="510" text-anchor="end" fill="#fff" font-size="10" font-weight="600">仮デザイン済み</text>

  <rect x="195" y="535" width="295" height="50" rx="10" fill="#edf5fa" stroke="#85bdd9" stroke-width="1"/>
  <text x="215" y="557" fill="#4a3a2a" font-size="10" font-weight="700">🎥 特典動画（10-15分）</text>
  <text x="215" y="573" fill="#777" font-size="9">思考のクセ → 限界提示 → セッション案内</text>

  <rect x="510" y="535" width="295" height="50" rx="10" fill="#edf5fa" stroke="#85bdd9" stroke-width="1"/>
  <text x="530" y="557" fill="#4a3a2a" font-size="10" font-weight="700">📝 PDF チェックシート</text>
  <text x="530" y="573" fill="#777" font-size="9">こじらせ度チェック+栄養コラム+翻訳ワーク</text>

  <text x="200" y="610" fill="#d4a017" font-size="10" font-weight="700">🎯 目標：特典消化率 60%+ → セッション申込率 15%+</text>
  <text x="200" y="628" fill="#a09080" font-size="9">※ 解決策を出し尽くさない。「一人では気づけない」限界を提示</text>

  <!-- Arrow 2→3 -->
  <line x1="500" y1="640" x2="500" y2="675" stroke="#b8a9d8" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="493,670 500,682 507,670" fill="#b8a9d8"/>

  <!-- ===== STAGE 3: MONITOR SESSION ===== -->
  <rect x="185" y="685" width="630" height="145" rx="16" fill="#fff" stroke="#b8a9d8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="185" y="685" width="630" height="35" rx="16" fill="url(#lavGrad)"/>
  <rect x="185" y="702" width="630" height="18" fill="url(#lavGrad)"/>
  <text x="215" y="710" fill="#fff" font-size="13" font-weight="900">💌 個別モニターセッション</text>
  <text x="680" y="710" text-anchor="end" fill="#fff" font-size="10" font-weight="600">モニター限定●名</text>
  <text x="215" y="747" fill="#4a3a2a" font-size="11" font-weight="700">愛犬からのメッセージ翻訳（栄養面＋マインド面）</text>
  <text x="215" y="767" fill="#777" font-size="10">• こじらせマインドを一緒に紐解く個別セッション</text>
  <text x="215" y="787" fill="#777" font-size="10">• セッション後アンケートで事例・声を収集</text>
  <text x="215" y="808" fill="#d4a017" font-size="10" font-weight="700">💰 通常価格 ¥XX,XXX → モニター特別価格 ¥X,XXX</text>

  <!-- Arrow 3→filter -->
  <line x1="500" y1="830" x2="500" y2="860" stroke="#b8a9d8" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="493,855 500,867 507,855" fill="#b8a9d8"/>

  <!-- ===== FILTER ===== -->
  <rect x="340" y="870" width="320" height="50" rx="25" fill="#f3f0fa" stroke="#b8a9d8" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="900" text-anchor="middle" fill="#7a6ba0" font-size="12" font-weight="900">💡 0期に興味ありますか？🌻</text>

  <!-- Branch: No -->
  <line x1="340" y1="895" x2="240" y2="895" stroke="#ccc" stroke-width="1.5"/>
  <line x1="240" y1="895" x2="240" y2="935" stroke="#ccc" stroke-width="1.5"/>
  <rect x="160" y="935" width="160" height="35" rx="10" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="240" y="957" text-anchor="middle" fill="#aaa" font-size="10" font-weight="600">LINE継続フォロー</text>

  <!-- Arrow: Yes -->
  <line x1="500" y1="920" x2="500" y2="970" stroke="url(#coralGrad)" stroke-width="3"/>
  <polygon points="493,964 500,978 507,964" fill="#e06b6b"/>
  <text x="530" y="955" fill="#e06b6b" font-size="10" font-weight="900">興味あり！</text>

  <!-- ===== STAGE 4: 0-KI ===== -->
  <rect x="200" y="985" width="600" height="155" rx="18" fill="#fff" stroke="url(#coralGrad)" stroke-width="3" filter="url(#shadowDeep)"/>
  <rect x="200" y="985" width="600" height="38" rx="18" fill="url(#coralGrad)"/>
  <rect x="200" y="1005" width="600" height="18" fill="url(#coralGrad)"/>
  <text x="230" y="1010" fill="#fff" font-size="13" font-weight="900">🎓 こじらせ飼い主マインド講座 0期</text>
  <text x="670" y="1010" text-anchor="end" fill="#fff" font-size="10" font-weight="600">少人数制</text>
  <text x="230" y="1050" fill="#4a3a2a" font-size="11" font-weight="700">目的：仮説検証 ＋ 事例収集 ＋ お客様の声</text>
  <text x="230" y="1072" fill="#777" font-size="10">• 個別サポートから開始（マンツーマン or 少人数）</text>
  <text x="230" y="1092" fill="#777" font-size="10">• カリキュラムのテスト＆改善</text>
  <text x="230" y="1112" fill="#777" font-size="10">• ビフォーアフター・感想をコンテンツ素材として収集</text>
  <text x="230" y="1130" fill="#d4a017" font-size="10" font-weight="700">📄 0期説明資料を準備する（要作成）</text>

  <!-- Arrow 4→5 -->
  <line x1="500" y1="1140" x2="500" y2="1175" stroke="#d4a017" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="493,1170 500,1182 507,1170" fill="#d4a017"/>

  <!-- ===== STAGE 5: FUTURE ===== -->
  <rect x="220" y="1190" width="560" height="100" rx="16" fill="#fff" stroke="#d4a017" stroke-width="2" filter="url(#shadow)" stroke-dasharray="6,4"/>
  <rect x="220" y="1190" width="560" height="32" rx="16" fill="url(#goldGrad)" opacity="0.7"/>
  <rect x="220" y="1206" width="560" height="16" fill="url(#goldGrad)" opacity="0.7"/>
  <text x="250" y="1214" fill="#fff" font-size="13" font-weight="900">🚀 本講座（1期〜）</text>
  <text x="250" y="1250" fill="#4a3a2a" font-size="11" font-weight="700">0期の事例・声を使って本格展開</text>
  <text x="250" y="1272" fill="#777" font-size="10">LP作成（事例ベース）/ 自動ウェビナー化 / YouTube集客の本格化 / 価格UP</text>

  <!-- ===== TIMELINE ===== -->
  <rect x="100" y="1350" width="800" height="420" rx="18" fill="#fff" stroke="#d4a017" stroke-width="2" filter="url(#shadowDeep)"/>
  <rect x="100" y="1350" width="800" height="42" rx="18" fill="url(#honeyGrad)"/>
  <rect x="100" y="1374" width="800" height="18" fill="url(#honeyGrad)"/>
  <text x="500" y="1378" text-anchor="middle" fill="#fff" font-size="15" font-weight="900">📅 3ヶ月ロードマップ（4/17〜7月末）</text>

  <!-- Phase 0 -->
  <rect x="130" y="1405" width="740" height="52" rx="10" fill="#eef6ee" stroke="#8cb88a" stroke-width="1"/>
  <text x="155" y="1425" fill="#8cb88a" font-size="11" font-weight="900">Phase 0（4/17〜4/30）設計</text>
  <text x="155" y="1445" fill="#4a3a2a" font-size="10">✅ ファネル設計 → 特典動画撮影 → LINE設定 → 0期説明資料 → LP公開テスト ※発信しない</text>

  <!-- Phase 1 -->
  <rect x="130" y="1465" width="740" height="52" rx="10" fill="#edf5fa" stroke="#85bdd9" stroke-width="1"/>
  <text x="155" y="1485" fill="#85bdd9" font-size="11" font-weight="900">Phase 1（5月）閉店集客＋モニター</text>
  <text x="155" y="1505" fill="#4a3a2a" font-size="10">閉店で既存フォロワーに案内 → モニター3-5名セッション → 事例収集 → 0期お誘い</text>

  <!-- Phase 2 -->
  <rect x="130" y="1525" width="740" height="52" rx="10" fill="#f3f0fa" stroke="#b8a9d8" stroke-width="1"/>
  <text x="155" y="1545" fill="#b8a9d8" font-size="11" font-weight="900">Phase 2（6月）SNS整備＋発信開始</text>
  <text x="155" y="1565" fill="#4a3a2a" font-size="10">YTリブランディング → TTP動画2-3本 → Instagram整理 → 0期カリキュラム完成</text>

  <!-- Phase 3 -->
  <rect x="130" y="1585" width="740" height="52" rx="10" fill="#fef0f0" stroke="#f2988e" stroke-width="1"/>
  <text x="155" y="1605" fill="#e06b6b" font-size="11" font-weight="900">Phase 3（7月）🎓 0期スタート</text>
  <text x="155" y="1625" fill="#4a3a2a" font-size="10">0期第1講義実施 → YouTube月2本定期投稿 → 1期設計着手</text>

  <!-- Principle -->
  <rect x="130" y="1650" width="740" height="45" rx="10" fill="#fff9e6" stroke="#d4a017" stroke-width="1"/>
  <text x="500" y="1670" text-anchor="middle" fill="#d4a017" font-size="10" font-weight="900">💡 大原則：設計してから発信。いきなり発信しない。全部整ってから出す。</text>
  <text x="500" y="1685" text-anchor="middle" fill="#999" font-size="9">4月＝設計 → 5月＝閉店＆事例 → 6月＝発信開始 → 7月＝0期</text>

  <!-- Bottom -->
  <rect x="150" y="1720" width="700" height="35" rx="8" fill="none" stroke="#d4a017" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="500" y="1742" text-anchor="middle" fill="#a09080" font-size="10" font-weight="600">詳細は kiichan-roadmap.svg を参照</text>
</svg>
