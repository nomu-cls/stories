<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>犬のきもち、わかってる？クイズ — 私たちの心の栄養診断</title>
    <meta name="description" content="栄養×飼い主マインドの専門家が教える、愛犬の心と体の健康クイズ。3分であなたとワンちゃんの関係を見直すきっかけに。">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --honey: #f5c542; --honey-deep: #d4a017; --honey-light: #fff9e6;
            --cream: #fff5d6; --peach: #f7b89c; --peach-deep: #e8926e;
            --coral: #f2988e; --coral-deep: #e06b6b;
            --sage: #8cb88a; --sage-light: #eef6ee;
            --sky: #85bdd9; --sky-light: #edf5fa;
            --lavender: #b8a9d8; --lavender-light: #f3f0fa;
            --brown: #c49a6c; --brown-light: #faf1e6;
            --bg: #fffcf5; --text: #4a3a2a; --muted: #a09080;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background: var(--bg);
            min-height: 100vh; min-height: 100dvh;
            color: var(--text);
        }
        .container {
            max-width: 480px; margin: 0 auto;
            display: flex; flex-direction: column;
            height: 100vh; height: 100dvh;
        }
        .header {
            background: linear-gradient(135deg, #fff9e6, #fff0e0, #fce8d8);
            padding: 14px 20px;
            display: flex; align-items: center; gap: 12px;
            border-bottom: 2px solid rgba(245,197,66,0.3);
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(245,197,66,0.12);
        }
        .header-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            overflow: hidden; flex-shrink: 0;
            box-shadow: 0 3px 10px rgba(245,197,66,0.25);
            border: 2.5px solid var(--honey);
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--honey-light), #fff0e0);
            font-size: 24px;
        }
        .ai-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--honey), var(--peach));
            color: #fff; font-size: 9px; font-weight: 700;
            padding: 1px 6px; border-radius: 4px;
            margin-left: 6px; vertical-align: middle; letter-spacing: 1px;
        }
        .header-info h3 { font-size: 14px; font-weight: 900; color: var(--text); }
        .header-info h3 .sensei { font-size: 11px; color: var(--honey-deep); font-weight: 700; }
        .header-info p {
            font-size: 10px; color: var(--honey-deep);
            display: flex; align-items: center; gap: 4px;
        }
        .header-info p .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--sage); animation: pulse 2s infinite;
        }
        .chat-area {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 12px;
            scroll-behavior: smooth;
            background: linear-gradient(180deg, var(--bg) 0%, #fff5e8 100%);
        }
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: rgba(245,197,66,0.3); border-radius: 2px; }
        .msg { display: flex; gap: 8px; max-width: 90%; }
        .msg-bot { align-self: flex-start; }
        .msg-user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            overflow: hidden; flex-shrink: 0; margin-top: 2px;
            box-shadow: 0 2px 6px rgba(245,197,66,0.15);
            border: 2px solid var(--honey);
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--honey-light), #fff0e0);
            font-size: 16px;
        }
        .msg-bubble {
            padding: 12px 16px; border-radius: 20px;
            font-size: 14px; line-height: 1.9;
            animation: fadeSlideIn 0.3s ease forwards;
        }
        .msg-bot .msg-bubble {
            background: #fff;
            border: 1px solid rgba(245,197,66,0.2);
            border-top-left-radius: 4px; color: var(--text);
            box-shadow: 4px 4px 12px rgba(245,197,66,0.06), -2px -2px 8px rgba(255,255,255,0.8);
        }
        .msg-user .msg-bubble {
            background: linear-gradient(135deg, var(--honey), var(--peach));
            border-top-right-radius: 4px; color: #fff; font-weight: 700;
        }
        .msg-bubble strong { color: var(--honey-deep); }
        .msg-user .msg-bubble strong { color: #fff; }
        .options-wrap {
            display: flex; flex-direction: column; gap: 8px;
            margin-left: 40px; margin-right: 16px;
            animation: fadeSlideUp 0.4s ease forwards;
        }
        .opt-btn {
            display: flex; align-items: center; gap: 10px;
            width: 100%; background: #fff;
            border: 2px solid rgba(245,197,66,0.25);
            border-radius: 16px; padding: 12px 16px;
            color: var(--text); font-size: 14px;
            font-family: 'Zen Maru Gothic', sans-serif;
            text-align: left; cursor: pointer;
            transition: all 0.2s; line-height: 1.5;
            box-shadow: 3px 3px 8px rgba(245,197,66,0.06), -2px -2px 6px rgba(255,255,255,0.7);
        }
        .opt-btn:hover {
            background: var(--honey-light);
            border-color: var(--honey);
            transform: translateX(4px);
            box-shadow: 4px 4px 12px rgba(245,197,66,0.15);
        }
        .opt-btn:active { transform: scale(0.97); }
        .opt-btn .letter-badge {
            background: var(--honey-light); color: var(--honey-deep);
            font-weight: 900; font-size: 12px;
            border-radius: 6px; padding: 2px 8px; flex-shrink: 0;
            border: 1px solid var(--honey);
        }
        .opt-emoji { font-size: 18px; flex-shrink: 0; }
        .typing { display: flex; gap: 8px; align-self: flex-start; }
        .typing-dots {
            display: flex; align-items: center; gap: 5px;
            padding: 14px 18px; background: #fff;
            border: 1px solid rgba(245,197,66,0.15);
            border-radius: 20px; border-top-left-radius: 4px;
            box-shadow: 3px 3px 8px rgba(245,197,66,0.06);
        }
        .typing-dots span {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--honey); opacity: 0.4;
            animation: typingBounce 1.4s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        .footer {
            padding: 12px 16px;
            border-top: 2px solid rgba(245,197,66,0.15);
            background: #fff; flex-shrink: 0;
            text-align: center;
        }
        .footer p { font-size: 11px; color: var(--muted); }
        .name-input {
            width: 100%; padding: 12px 16px; border-radius: 16px;
            border: 2px solid rgba(245,197,66,0.35); background: #fff;
            color: var(--text); font-size: 15px; font-family: 'Zen Maru Gothic', sans-serif;
            outline: none; transition: border-color 0.2s;
            box-shadow: inset 2px 2px 6px rgba(245,197,66,0.05);
        }
        .name-input:focus { border-color: var(--honey); }
        .name-input::placeholder { color: #c8b090; }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .hidden { display: none !important; }
        
        .result-card {
            background: linear-gradient(135deg, #fff9e6, #fff0e0);
            border: 2px solid rgba(245,197,66,0.2);
            border-radius: 20px; padding: 20px;
            box-shadow: 6px 6px 16px rgba(245,197,66,0.08), -3px -3px 8px rgba(255,255,255,0.8);
        }
        .cta-btn {
            display: block; width: 100%;
            background: linear-gradient(135deg, var(--honey), var(--peach));
            color: #fff; font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 16px; font-weight: 900;
            padding: 18px; border: none; border-radius: 50px;
            cursor: pointer; text-align: center; text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(245,197,66,0.35);
            margin: 8px 0;
        }
        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(245,197,66,0.45);
        }
        .submit-btn {
            flex-shrink: 0; width: auto; padding: 12px 24px;
            background: linear-gradient(135deg, var(--honey), var(--peach));
            color: #fff; font-weight: 900; border: 2px solid var(--honey);
            border-radius: 16px; font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 14px; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 3px 10px rgba(245,197,66,0.2);
        }
        .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 15px rgba(245,197,66,0.3); }

        .explain-card {
            background: var(--sage-light);
            border-left: 4px solid var(--sage);
            border-radius: 4px 12px 12px 4px;
            padding: 12px 16px; margin-top: 8px;
            font-size: 13px; line-height: 1.7;
        }
        .explain-card.wrong {
            background: #fef3ee;
            border-left-color: var(--peach);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-avatar"><img src="kiichan.jpeg" style="width:100%; height:100%; object-fit:cover;"></div>
            <div class="header-info">
                <h3>🌻 犬のきもち、わかってる？クイズ <span class="ai-badge">無料</span></h3>
                <p><span class="dot"></span> <span>愛犬の幸せ度チェック 🐾</span></p>
            </div>
        </div>
        <div class="chat-area" id="chatArea"></div>
        <div class="footer">
            <p>選択肢をタップしてね 🐾</p>
        </div>
    </div>

<script>
const AVATAR = '<img src="kiichan.jpeg" style="width:100%; height:100%; object-fit:cover;">';

/* ── State ── */
let userName = '';
let userDogName = '';
let score = 0;
let currentQ = 0;

const chatArea = document.getElementById('chatArea');

/* ── Helpers ── */
function scrollToBottom() {
    setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 50);
}
function addBotMsg(html) {
    const div = document.createElement('div');
    div.className = 'msg msg-bot';
    div.innerHTML = `<div class="msg-avatar">${AVATAR}</div>
        <div class="msg-bubble">${html}</div>`;
    chatArea.appendChild(div); scrollToBottom();
}
function addUserMsg(text) {
    const div = document.createElement('div');
    div.className = 'msg msg-user';
    div.innerHTML = `<div class="msg-bubble">${text}</div>`;
    chatArea.appendChild(div); scrollToBottom();
}
function addOptions(options, callback) {
    const wrap = document.createElement('div');
    wrap.className = 'options-wrap'; wrap.id = 'currentOptions';
    options.forEach((opt, idx) => {
        const letters = ['A', 'B', 'C'];
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        const letterBadge = opt.showLetter !== false ? `<span class="letter-badge">${letters[idx]}</span>` : '';
        const emojiBadge = opt.emoji ? `<span class="opt-emoji">${opt.emoji}</span>` : '';
        
        btn.innerHTML = `${letterBadge}${emojiBadge}<span>${opt.label}</span>`;
        btn.onclick = () => {
            wrap.remove();
            addUserMsg(`${opt.label}`);
            setTimeout(() => callback(idx, opt), 300);
        };
        wrap.appendChild(btn);
    });
    chatArea.appendChild(wrap); scrollToBottom();
}
function addCustomHTML(html) {
    const div = document.createElement('div');
    div.className = 'msg msg-bot';
    div.innerHTML = `<div class="msg-avatar">${AVATAR}</div>
        <div class="msg-bubble" style="padding: 8px 12px; background: transparent; border: none; box-shadow: none;">${html}</div>`;
    chatArea.appendChild(div); scrollToBottom();
}
function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing'; div.id = 'typingIndicator';
    div.innerHTML = `<div class="msg-avatar">${AVATAR}</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>`;
    chatArea.appendChild(div); scrollToBottom();
}
function hideTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
}
function botSays(messages, onDone) {
    let i = 0;
    function next() {
        if (i >= messages.length) { if (onDone) setTimeout(onDone, 300); return; }
        showTyping();
        const delay = 800 + Math.min(messages[i].length * 15, 2500);
        setTimeout(() => {
            hideTyping(); addBotMsg(messages[i]); i++;
            setTimeout(next, 400);
        }, delay);
    }
    next();
}

/* ━━━━━━ クイズデータ（きいちゃん監修版） ━━━━━━ */
const quizData = [
    {
        q: '犬が寝ている時、<br>脚や瞼がピクピク動いている<br>ことはありませんか？<br><br>あれは<strong>レム睡眠</strong>といって<br>浅い睡眠でしょうか？',
        opts: [
            { label: 'はい、レム睡眠です！', reply: 'さすがです！ワンちゃんの睡眠についてよくご存知ですね✨' },
            { label: 'いいえ、深い眠りです', reply: '実は、勘違いされやすいポイントなんですよ☺️' }
        ],
        correct: 0,
        explain: '人は日中起きて過ごして夜間は寝ますが、犬は日中浅い眠りを繰り返す（うたた寝）をして過ごします。<br><br>ライフステージによっても違いますが、1日の睡眠時間は<strong>12〜14時間</strong>ともいわれています。',
        science: '睡眠が体の回復や脳のリフレッシュになるのは人も犬も同じです。深い睡眠を補うために長い睡眠時間を確保してあげることで、ストレスケアにもつながりますよ🐾'
    },
    {
        q: '犬はあなたのストレスを<br>感じ取ることができると思いますか？',
        opts: [
            { label: 'なんとなく察しているかも', reply: '「なんとなく」じゃなくて、実はしっかり伝わっているんです☺️' },
            { label: '科学的に証明されている', reply: '大正解！実はすでに科学的に証明されているんですよ✨' }
        ],
        correct: 1,
        explain: 'スウェーデンの大学の研究で、飼い主のコルチゾール（ストレスホルモン）レベルと、犬のコルチゾールが<strong>連動している</strong>ことが証明されています！',
        science: '「飼い主の心の状態が、愛犬の健康に直結する」ということを科学的に裏付けているんですよ🌻'
    },
    {
        q: '犬にとって大切な散歩ですが、<br><strong>脳トレにつながる散歩</strong>は<br>どれでしょう？',
        opts: [
            { label: 'とにかくたくさん歩く散歩', reply: '歩くのも大事ですが、一番の脳トレは別にあるんですよ🐾' },
            { label: 'いろんな匂いを嗅ぐ散歩', reply: '素晴らしい✨ その通りです！愛犬のことをよく観察されていますね🐾' },
            { label: '走って疲れさせる散歩', reply: '運動も大切ですが、実は脳トレという意味では少し違うんです☺️' }
        ],
        correct: 1,
        explain: '匂いを嗅ぐことで<strong>リラックス効果と脳の活性化</strong>が期待でき、犬の認知症予防にもつながるといわれています🐾',
        science: '犬にとって散歩の満足感は、目的地や距離よりも実は<strong>探索を楽しむこと</strong>。少しリードを緩めて嗅ぎ回れる散歩を取り入れて、楽しんでみてくださいね🌻'
    },
    {
        q: '生存において最も大事な<br>栄養素は<strong>「タンパク質」</strong>でしょうか？',
        opts: [
            { label: 'はい、タンパク質が一番！', reply: 'そう言われていることが多いので、そう思いがちですよね☺️' },
            { label: 'いいえ、水分が一番大事です', reply: '大正解です！水分の重要性を知っているなんてさすがです🌻' },
            { label: 'バランスが一番大事です', reply: 'バランスも大事ですが、実は根本にある重要な栄養素があるんです🐾' }
        ],
        correct: 1,
        explain: 'もちろんタンパク質も大切ですが、体重の<strong>60〜70%</strong>を占める【水分】が最も重要です。<br><br>体内の水分のたった<strong>10%</strong>を失うだけでも、死に至ることがあるからです。',
        science: 'カロリーこそありませんが、栄養学では水分は<strong>重要な栄養素</strong>としてとらえます。当たり前すぎて見落としがちですが、ここがとても大切なんですよ🐾'
    },
    {
        q: '飼い主が「ごめんね」と<br>言い続けると、犬はどうなるでしょう？',
        opts: [
            { label: '愛情が伝わり、安心する', reply: 'そうあってほしいと願いますが、実は違う伝わり方をしているんです☺️' },
            { label: '特に何も感じていない', reply: '言葉の意味はわからなくても、実はしっかり感じ取っているんですよ🐾' },
            { label: '不安になることがある', reply: '正解です！愛犬はあなたの言葉の裏の「トーン」を敏感に察知しています✨' }
        ],
        correct: 2,
        explain: '犬は言葉の意味までは分かりませんが、飼い主の<strong>「感情のトーン」</strong>には非常に敏感です。<br><br>罪悪感を込めた声色は、犬に「何か悪いことが起きている」というシグナルとして伝わり、不安行動の原因になることもあるのです。',
        science: 'あなたの感情が、目に見えない形で愛犬に影響しているんですよ🌻'
    }
];

/* ━━━━━━ FLOW ━━━━━━ */

function startChat() {
    const ticket = `
        <div style="text-align:center;padding:20px 16px;background:linear-gradient(135deg,#fff9e6,#fff0e0,#fce8d8);border:2px solid rgba(245,197,66,0.3);border-radius:20px;margin:4px 0;">
            <div style="font-size:10px;color:var(--honey-deep);letter-spacing:4px;margin-bottom:8px;font-weight:700;">🐾 FREE QUIZ</div>
            <div style="font-size:17px;color:var(--text);line-height:1.8;font-weight:900;">
                犬のきもち、わかってる？<br>「心の栄養」充足度クイズ
            </div>
            <div style="width:40px;height:2px;background:linear-gradient(90deg,var(--honey),var(--peach));margin:12px auto;border-radius:1px;"></div>
            <div style="font-size:11px;color:var(--muted);line-height:1.6;">無料 ／ 全5問 ／ 栄養×飼い主マインドの専門家監修 🌻</div>
        </div>`;
    addCustomHTML(ticket);

    setTimeout(() => {
        botSays([
            'こんにちは！🌻<br><br>栄養×飼い主マインドの専門家、<br><strong>きいちゃん先生</strong>です。<br>来てくださってありがとうございます🐾',
            '「病院食を食べてくれない…」<br>「いろいろ試したけど、良くならない…」<br><br>愛犬の病気や健康への漠然とした不安、<br>治療に行き詰まりを感じたことはありませんか？🥺'
        ], () => {
            addOptions([
                { label: 'あります！', emoji: '🥺', showLetter: false },
                { label: '少しだけ…', emoji: '🐾', showLetter: false }
            ], () => {
                botSays([
                    '一生懸命に愛しているからこそ、<br>「なんで良くなってくれないの？」と<br>自分を責めて、怖い顔を見せてしまったり…',
                    '実は、うまくいかないのは<br>目に見えない<strong>「心の栄養」</strong>が<br>見落とされているからかもしれません。',
                    'そこで今日は、愛犬の気持ちを満たす<br>「心の栄養」のヒントがわかる<br>5つのクイズをご用意しました！',
                    '少しだけお時間よろしいですか？🐾<br>まずは、お名前を教えてください！'
                ], () => askName());
            });
        });
    }, 600);
}

function askName() {
    const wrap = document.createElement('div');
    wrap.className = 'options-wrap';
    wrap.innerHTML = `
        <div style="display:flex;gap:8px;">
            <input type="text" class="name-input" id="nameInput" placeholder="あなたのお名前…🐾" maxlength="20">
            <button class="submit-btn" id="nameSubmit">OK</button>
        </div>`;
    chatArea.appendChild(wrap); scrollToBottom();
    const input = document.getElementById('nameInput');
    const submit = document.getElementById('nameSubmit');
    const doSubmit = () => {
        const name = input.value.trim();
        if (!name) { input.focus(); return; }
        userName = name; wrap.remove();
        addUserMsg(name);
        setTimeout(() => {
            botSays([
                `<strong>${userName}</strong>さん！🐾<br>よろしくお願いいたします🌻`,
                `ワンちゃんのお名前も<br>教えていただけますか？🐕`
            ], () => askDogName());
        }, 300);
    };
    submit.onclick = doSubmit;
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSubmit(); });
    setTimeout(() => input.focus(), 500);
}

function askDogName() {
    const wrap = document.createElement('div');
    wrap.className = 'options-wrap';
    wrap.innerHTML = `
        <div style="display:flex;gap:8px;">
            <input type="text" class="name-input" id="dogNameInput" placeholder="ワンちゃんのお名前…🐕" maxlength="20">
            <button class="submit-btn" id="dogNameSubmit">OK</button>
        </div>`;
    chatArea.appendChild(wrap); scrollToBottom();
    const input = document.getElementById('dogNameInput');
    const submit = document.getElementById('dogNameSubmit');
    const doSubmit = () => {
        const name = input.value.trim();
        if (!name) { input.focus(); return; }
        userDogName = name; wrap.remove();
        addUserMsg('🐕 ' + name);
        setTimeout(() => {
            botSays([
                `<strong>${userDogName}</strong>ちゃんですね！🐕💛<br>とっても素敵なお名前です！`,
                `それでは、${userName}さんと<br>${userDogName}ちゃんのために、<br><br><strong>心の栄養クイズ（全5問）</strong>を<br>スタートしますね！🐾<br><br>愛犬の気持ちを想像しながら<br>選んでみてください✨`
            ], () => renderQuestion());
        }, 300);
    };
    submit.onclick = doSubmit;
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSubmit(); });
    setTimeout(() => input.focus(), 500);
}

/* ── クイズ処理 ── */
function renderQuestion() {
    if (currentQ >= quizData.length) {
        showFinalMessage();
        return;
    }
    const q = quizData[currentQ];
    
    botSays([
        `<strong style="color:var(--honey-deep);">Q${currentQ + 1} / 5</strong><br><br>${q.q}`
    ], () => {
        addOptions(q.opts, (idx, opt) => {
            handleAnswer(idx);
        });
    });
}

function handleAnswer(selectedIdx) {
    const q = quizData[currentQ];
    const isCorrect = selectedIdx === q.correct;
    if (isCorrect) score += 20;

    const explainHtml = `
        <div class="explain-card ${isCorrect ? '' : 'wrong'}">
            <div style="font-weight:900; color:${isCorrect ? 'var(--sage)' : 'var(--peach-deep)'}; margin-bottom:8px;">
                ${isCorrect ? '✅ 大正解！' : '惜しい！正解は「' + q.opts[q.correct].label + '」です'}
            </div>
            ${q.explain}
            <div style="margin-top:10px; padding-top:8px; border-top:1px dashed rgba(0,0,0,0.1); font-size:11px; color:#666;">
                🔬 <strong>きいちゃんの視点：</strong><br>${q.science}
            </div>
        </div>
    `;

    setTimeout(() => {
        botSays([
            `${q.opts[selectedIdx].reply}`,
        ], () => {
             addCustomHTML(explainHtml);
             setTimeout(() => {
                const nextBtnWrap = document.createElement('div');
                nextBtnWrap.className = 'options-wrap';
                const nextBtn = document.createElement('button');
                nextBtn.className = 'submit-btn';
                nextBtn.style.display = 'block';
                nextBtn.style.width = '100%';
                nextBtn.textContent = currentQ < quizData.length - 1 ? '次の問題へ →' : 'メッセージを読む 💌';
                nextBtn.onclick = () => {
                    nextBtnWrap.remove();
                    currentQ++;
                    renderQuestion();
                };
                nextBtnWrap.appendChild(nextBtn);
                chatArea.appendChild(nextBtnWrap);
                scrollToBottom();
             }, 800);
        });
    }, 400);
}

function showFinalMessage() {
    botSays([
        `${userName}さん、<br>ここまでお付き合いくださって<br>本当にありがとうございました 🐾`,
        `一番大切なのは、<br><strong>あなた自身の心の状態</strong>です🌻<br><br>もし飼い主さんが笑顔になれない時は、まず自分のケアを最優先にしてあげてください。`,
        `あなたが穏やかでいられたら、<br>${userDogName}ちゃんも穏やかになれる。<br><br>一人で抱え込まなくて大丈夫ですよ。<br>一緒に、<strong>「3年後もハグする未来」</strong>を<br>作っていきましょう🐾💛`
    ], () => {
        setTimeout(() => {
            const nextBtnWrap = document.createElement('div');
            nextBtnWrap.className = 'options-wrap';
            const nextBtn = document.createElement('button');
            nextBtn.className = 'submit-btn';
            nextBtn.style.display = 'block';
            nextBtn.style.width = '100%';
            nextBtn.style.background = 'var(--honey)';
            nextBtn.textContent = '🐾 クイズの診断結果を見る';
            nextBtn.onclick = () => {
                nextBtnWrap.remove();
                showDiagResult();
            };
            nextBtnWrap.appendChild(nextBtn);
            chatArea.appendChild(nextBtnWrap);
            scrollToBottom();
        }, 800);
    });
}

/* ━━━ 診断結果とストーリー展開 ━━━ */
function showDiagResult() {
    let title, desc, color;
    if (score === 100) {
        title = '🏆 愛犬の「心の栄養」しっかり届いています！';
        desc = '全問正解！愛犬との絆が毎日のなかで活きていますね。さらなる心の栄養のヒント、深めてみませんか？';
        color = 'var(--sage)';
    } else if (score >= 60) {
        title = '🐕 愛犬の「心の栄養」よく見ていらっしゃいます！';
        desc = '実は犬は、飼い主の感情をまるごと受け取っています。見落としがちな「心の栄養」に気づくと、毎日がもっと穏やかになりますよ。';
        color = 'var(--honey-deep)';
    } else {
        title = '🐶 知ることが最高の愛情・心の栄養です！';
        desc = '犬のきもちには、目に見えない「心の栄養」が隠れています。今日のクイズでの気づきが、素晴らしい第一歩です！';
        color = 'var(--coral-deep)';
    }

    const resultCard = `
        <div class="result-card" style="margin:6px 0; text-align:center;">
            <div style="font-size:10px;color:var(--honey-deep);letter-spacing:3px;font-weight:700;">🐾 クイズ結果</div>
            <div style="margin:16px 0;">
                <div style="font-size:42px; font-weight:900; color:${color}; line-height:1;">${score} <span style="font-size:16px;color:var(--muted);">/ 100点</span></div>
            </div>
            <div style="font-size:16px;font-weight:900;color:var(--text);margin-top:6px;line-height:1.6;">
                ${title}
            </div>
            <div style="margin-top:12px; font-size:13px; color:#777; line-height:1.7; text-align:left;">
                ${desc}
            </div>
        </div>`;
    
    addCustomHTML(resultCard);

    setTimeout(() => {
        botSays([
            `${userName}さん、<br>クイズはいかがでしたか？🐾`,
            `愛犬の「きもち」や行動の裏には、<br>目に見えない<strong>『心の栄養』</strong>が<br>大きく関わっているんです。`,
            `「こんなに気を遣っているのに、どうして…」<br><br>そんな風に悩んだことはありませんか？`
        ], () => {
            addOptions([
                { label: 'あります…😢', emoji: '🐾', showLetter: false },
                { label: 'どういうことですか？', emoji: '🌻', showLetter: false }
            ], () => {
                botSays([
                    `実は私、<br>過去の自分と同じように悩む飼い主さんをたくさん見てきて、1つ気づいたことがあるんです。`,
                    `フードも変えた。<br>環境も整えた。<br>話題の療法も全部試した。<br><br>それでも良くならない…<br>そんな子がいる、と。`,
                    `何が『心の栄養』を<br>左右していたと思いますか？🐾`
                ], () => {
                    addOptions([
                        { label: 'フードの質でしょうか？', emoji: '🍚', showLetter: false },
                        { label: '犬種や体質でしょうか？', emoji: '🧬', showLetter: false },
                        { label: '飼い主の気持ちでしょうか？', emoji: '💛', showLetter: false },
                    ], (val, opt) => {
                        if (opt.emoji === '💛') {
                            botSays([
                                `${userName}さん…<br>おっしゃる通りです。<br><br>そう、<strong>正解</strong>です。`,
                                `でも、どうして<br>それが正解なのか、<br>私の話を少しだけ聞いていただけますか？🐾`
                            ], () => showStory());
                        } else {
                            botSays([
                                `うんうん、それもとても大切です！<br><br>でもね、実は<br>もっと根っこにあるものに気づいたんです。`,
                                `私も最初は、<br>信じられませんでした。<br><br>少しだけ、私の体験を聞いていただけますか？🐾`
                            ], () => showStory());
                        }
                    });
                });
            });
        });
    }, 1500);
}

/* ━━━ きいちゃんの原体験ストーリー ━━━ */
function showStory() {
    botSays([
        `私の愛犬がね、<br><strong>急性膵炎</strong>になったんです。<br><br>しかも<strong>劇症膵炎</strong>で、<br>かなり状態が厳しくて…`,
        `治療の観察中に、<br><strong>大量の下血</strong>があって。<br><br>もうダメかもしれない…<br>本当にそう思いました。`,
        `栄養のプロとして<br>「これをあげればいい」というのを<br>全部試してもダメで。<br><br>なぜ？って。<br>自分を激しく責めました。`
    ], () => {
        addOptions([
            { label: 'それは辛かったですね…', emoji: '😢', showLetter: false },
            { label: '続きを聞かせてください', emoji: '🐾', showLetter: false }
        ], () => {
            botSays([
                `「お願いだから、いかないで…」<br><br>片時もそばを離れないで、<br>心配し続ける毎日でした。<br><br>「この子は命をかけて、<br>　何を伝えようとしているんだろう」<br>ずっと考え続けました。`,
                `そしてある日、<br>こう考えてみたんです。<br><br>「もし、この病気で旅立つことを<br>　<strong>この子自身が決めていたとしたら？</strong>」<br><br>そう仮定して、<br>胸がちぎれそうでしたけれど…`,
                `「できるだけのことをしよう。<br>　でも、<strong>あとはこの子に任せよう</strong>」<br><br>そう決めたんです。`
            ], () => {
                addOptions([
                    { label: '……うんうん', emoji: '🌻', showLetter: false }
                ], () => {
                    botSays([
                        `心配し続ける時間を手放して、<br>看病をしながら、<br><strong>自分自身のケアも取り入れていく</strong><br>と決めました。`,
                        `するとね…<br><br>愛犬が、<strong>自分から<br>水を飲みに行った</strong>んです🥺<br><br>そこから劇的に回復しました。`,
                        `栄養だけではなかった。<br><br><strong>ストレスは栄養泥棒</strong>。<br>私の「心配というエネルギー」が<br>愛犬に伝わってしまっていたんです。<br><br>愛犬は命をかけて教えてくれた先生でした🌻`,
                        `だから、私が今お伝えしているのは<br>数値改善への執着を手放し、<br>「<strong>本来の絆とマインド</strong>」を取り戻すこと。<br><br>ということなんです。`
                    ], () => {
                        addOptions([
                            { label: 'もっと詳しく知りたいです！', emoji: '💛', showLetter: false },
                            { label: '少し考えたいです…', emoji: '😔', showLetter: false },
                        ], (idx, opt) => {
                            if (opt.emoji === '😔') {
                                botSays([
                                    `大丈夫ですよ、無理なさらないでくださいね🐾<br>一人で抱え込まず、ご自身のペースを大切にしてください。`,
                                    `${userName}さんがここまで${userDogName}ちゃんに<br>向き合っていること、それ自体が<br>もう立派な愛情の証拠ですよ🌻`,
                                    `でも…<br>${userDogName}ちゃんのために<br>ひとつだけ、<br><strong>特別な動画</strong>をお届けしたくて🎁<br><br>観るだけで、きっと心が軽くなるはずです💛`
                                ], () => showCTA());
                            } else {
                                botSays([
                                    `うれしいです！💛`,
                                    `大切なのは、病気と闘うことよりも<br>${userName}さんが笑顔でいられること。<br><br>${userName}さんがここまで${userDogName}ちゃんに<br>向き合っている想い、絶対に伝わっています🐾`,
                                    `そんな${userName}さんと<br>${userDogName}ちゃんのために、<br>特別な<strong>動画プレゼント</strong>を<br>ご用意しました🎁`

}
